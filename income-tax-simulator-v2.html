<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종합소득세 시뮬레이터 v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    kbd { font-family: "Noto Sans KR", monospace; }

    /* ===== 인쇄 전용 스타일: A4 세로 1페이지 ===== */
    @media print {
      @page {
        size: A4 portrait;
        margin: 10mm;
      }

      /* 색상 보존 (잉크 절약 모드 무력화) */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      /* 화면용 제약 해제 */
      html, body, #root {
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        background: white !important;
      }
      body { font-size: 11px !important; }
      .h-screen { height: auto !important; }
      .overflow-hidden { overflow: visible !important; }
      .flex-1 { flex: 0 0 auto !important; }
      .bg-slate-100 { background: white !important; }
      .max-w-7xl { max-width: none !important; }

      /* 인쇄 시 숨김 (인쇄 버튼·업데이트/초기화/키보드 안내) */
      .no-print { display: none !important; }

      /* 메인 그리드: 1열 세로 배치 강제 (입력 위 → 결과 아래) */
      .print-main-grid {
        display: block !important;
      }
      .print-main-grid > div {
        width: 100% !important;
        max-width: none !important;
        margin-bottom: 6px !important;
      }

      /* 각 섹션 페이지 분할 방지 */
      .print-section {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .print-result {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        height: auto !important;
      }

      /* 컴팩트 패딩 */
      .print-main-grid .p-2\.5 { padding: 6px !important; }
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    const TAX_YEAR = 2025;
    const WITHHOLDING_RATE = 0.03; // 인적용역 원천징수율 3% 고정

    const BRACKETS = [
      { limit: 14_000_000,    rate: 0.06, deduction: 0,          label: "1,400만원 이하" },
      { limit: 50_000_000,    rate: 0.15, deduction: 1_260_000,  label: "1,400만~5,000만원" },
      { limit: 88_000_000,    rate: 0.24, deduction: 5_760_000,  label: "5,000만~8,800만원" },
      { limit: 150_000_000,   rate: 0.35, deduction: 15_440_000, label: "8,800만~1.5억원" },
      { limit: 300_000_000,   rate: 0.38, deduction: 19_940_000, label: "1.5억~3억원" },
      { limit: 500_000_000,   rate: 0.40, deduction: 25_940_000, label: "3억~5억원" },
      { limit: 1_000_000_000, rate: 0.42, deduction: 35_940_000, label: "5억~10억원" },
      { limit: Infinity,      rate: 0.45, deduction: 65_940_000, label: "10억원 초과" },
    ];

    const BUSINESS_CODES = {
      "940100": { name: "작가",                       basic: 58.7, excess: 42.2 },
      "940200": { name: "화가 및 관련예술가",         basic: 68.0, excess: 55.2 },
      "940301": { name: "작곡가",                     basic: 49.7, excess: 29.6 },
      "940302": { name: "배우 등",                    basic: 29.0, excess: 10.6 },
      "940303": { name: "모델",                       basic: 40.9, excess: 17.3 },
      "940304": { name: "가수",                       basic: 13.5, excess: 4.2  },
      "940305": { name: "성악가 등",                  basic: 61.6, excess: 46.2 },
      "940306": { name: "1인미디어콘텐츠창작자",      basic: 64.1, excess: 49.7 },
      "940500": { name: "연예보조서비스",             basic: 70.9, excess: 59.3 },
      "940600": { name: "자문·감독·지도·고문료",     basic: 58.4, excess: 41.8 },
      "940901": { name: "바둑기사",                   basic: 62.6, excess: 47.6 },
      "940902": { name: "꽃꽂이 및 요리교사",         basic: 81.8, excess: 74.5 },
      "940903": { name: "재단사 및 학원강사",         basic: 61.7, excess: 46.4 },
      "940904": { name: "직업운동가",                 basic: 54.5, excess: 36.3 },
      "940905": { name: "유흥접객원 및 댄서",         basic: 61.7, excess: 46.4 },
      "940906": { name: "보험설계사",                 basic: 77.6, excess: 68.6 },
      "940907": { name: "음료품배달원",               basic: 80.0, excess: 72.0 },
      "940908": { name: "서적 및 화장품외판원",       basic: 75.0, excess: 65.0 },
      "940909": { name: "컴퓨터프로그래머",           basic: 64.1, excess: 49.7 },
      "940910": { name: "다단계판매원 후원수당",      basic: 67.8, excess: 54.9 },
      "940911": { name: "기타 모집수당·채권회수수당", basic: 67.7, excess: 54.8 },
      "940912": { name: "개인간병인",                 basic: 80.2, excess: 72.3 },
      "940913": { name: "대리운전기사",               basic: 73.7, excess: 63.2 },
      "940914": { name: "골프장캐디",                 basic: 74.3, excess: 64.0 },
      "940915": { name: "목욕관리사",                 basic: 78.2, excess: 69.5 },
      "940916": { name: "행사도우미",                 basic: 69.8, excess: 57.7 },
      "940917": { name: "심부름용역원",               basic: 71.5, excess: 60.1 },
      "940918": { name: "퀵서비스배달원",             basic: 79.4, excess: 71.2 },
      "940919": { name: "이삿짐운반원",               basic: 74.2, excess: 63.9 },
      "940920": { name: "학습지 방문강사",            basic: 75.0, excess: 65.0 },
      "940921": { name: "교육교구 방문강사",          basic: 75.6, excess: 65.8 },
      "940922": { name: "대여제품 방문점검원",        basic: 75.0, excess: 65.0 },
      "940923": { name: "대출모집인",                 basic: 67.5, excess: 54.5 },
      "940924": { name: "신용카드회원모집인",         basic: 71.3, excess: 59.8 },
      "940925": { name: "방과후강사",                 basic: 69.3, excess: 57.0 },
      "940926": { name: "소프트웨어프리랜서",         basic: 64.4, excess: 50.2 },
      "940927": { name: "관광통역안내사",             basic: 64.1, excess: 49.7 },
      "940928": { name: "어린이통학버스기사",         basic: 72.4, excess: 61.4 },
      "940929": { name: "중고자동차판매원",           basic: 75.0, excess: 65.0 },
    };

    const FOUR_M = 40_000_000;

    const calcBusinessIncomeFromRevenue = (revenue, info) => {
      if (!info || !revenue || revenue <= 0) return 0;
      if (revenue <= FOUR_M) {
        return Math.floor(revenue * (1 - info.basic / 100));
      }
      const baseExpense   = FOUR_M * (info.basic  / 100);
      const excessExpense = (revenue - FOUR_M) * (info.excess / 100);
      return Math.floor(revenue - baseExpense - excessExpense);
    };

    const calcTax = (taxBase) => {
      if (taxBase <= 0) return { tax: 0, bracket: null, marginalRate: 0 };
      for (const b of BRACKETS) {
        if (taxBase <= b.limit) {
          return { tax: Math.floor(taxBase * b.rate - b.deduction), bracket: b, marginalRate: b.rate };
        }
      }
      return { tax: 0, bracket: null, marginalRate: 0 };
    };

    const findMaxBaseZeroTax = (taxCredit) => {
      if (taxCredit <= 0) return 0;
      let lowerLimit = 0;
      for (const b of BRACKETS) {
        let candidate = Math.ceil((taxCredit + 1 + b.deduction) / b.rate) - 1;
        let safety = 0;
        while (candidate > 0 && Math.floor(candidate * b.rate - b.deduction) > taxCredit && safety < 5) {
          candidate--; safety++;
        }
        safety = 0;
        while (Math.floor((candidate + 1) * b.rate - b.deduction) <= taxCredit && safety < 5) {
          candidate++; safety++;
        }
        if (candidate >= lowerLimit && candidate <= b.limit) return candidate;
        if (candidate > b.limit) { lowerLimit = b.limit; continue; }
        return lowerLimit;
      }
      return BRACKETS[BRACKETS.length - 1].limit;
    };

    const fmt = (n) => {
      if (!n || isNaN(n)) return "0";
      return Math.floor(Math.abs(n)).toLocaleString("ko-KR");
    };

    const evalExpression = (raw) => {
      if (raw == null) return { valid: false, value: null, hasOperator: false };
      const cleaned = String(raw).replace(/[,\s]/g, "");
      if (cleaned === "") return { valid: true, value: 0, hasOperator: false };
      const hasOperator = /[+\-*/]/.test(cleaned.slice(1)) || /^[*/]/.test(cleaned);
      if (!/^[\d+\-*/.()]+$/.test(cleaned)) return { valid: false, value: null, hasOperator };
      try {
        const result = new Function('"use strict"; return (' + cleaned + ');')();
        if (typeof result !== "number" || !isFinite(result) || isNaN(result)) return { valid: false, value: null, hasOperator };
        return { valid: true, value: Math.floor(result), hasOperator };
      } catch {
        return { valid: false, value: null, hasOperator };
      }
    };

    const parseResidentId = (rrn) => {
      const cleaned = (rrn || "").replace(/[^\d]/g, "");
      if (cleaned.length < 6) return null;
      const yy = parseInt(cleaned.substring(0, 2), 10);
      const mm = parseInt(cleaned.substring(2, 4), 10);
      const dd = parseInt(cleaned.substring(4, 6), 10);
      if (isNaN(yy) || isNaN(mm) || isNaN(dd)) return null;
      if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
      let century, gender = null;
      if (cleaned.length >= 7) {
        const s = parseInt(cleaned.charAt(6), 10);
        if (s === 9 || s === 0) century = 1800;
        else if (s === 1 || s === 2) century = 1900;
        else if (s === 3 || s === 4) century = 2000;
        else if (s === 5 || s === 6) century = 1900;
        else if (s === 7 || s === 8) century = 2000;
        else century = 1900;
        gender = s % 2 === 1 ? "남" : "여";
      } else {
        const currentYY = new Date().getFullYear() % 100;
        century = yy <= currentYY + 5 ? 2000 : 1900;
      }
      const birthYear = century + yy;
      const age = TAX_YEAR - birthYear;
      return { age, birthYear, gender };
    };

    const formatRrnDisplay = (rrn) => {
      const c = (rrn || "").replace(/[^\d]/g, "").substring(0, 7);
      if (c.length <= 6) return c;
      return `${c.substring(0, 6)}-${c.substring(6, 7)}`;
    };

    const CalculatorIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="16" height="20" x="4" y="2" rx="2"/>
        <line x1="8" x2="16" y1="6" y2="6"/>
        <line x1="16" x2="16" y1="14" y2="18"/>
        <path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/>
        <path d="M12 14h.01"/><path d="M8 14h.01"/>
        <path d="M12 18h.01"/><path d="M8 18h.01"/>
      </svg>
    );

    const ResetIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    );

    const ClockIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    );

    const RefreshIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
        <path d="M16 16h5v5"/>
      </svg>
    );

    const PrinterIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
    );

    const RrnInput = ({ value, onChange }) => (
      <input
        type="text"
        inputMode="numeric"
        data-nav="primary"
        value={formatRrnDisplay(value)}
        onChange={(e) => {
          const raw = e.target.value.replace(/[^\d]/g, "").substring(0, 7);
          onChange(raw);
        }}
        onFocus={(e) => e.target.select()}
        placeholder="YYMMDD-S"
        maxLength={8}
        className="w-32 px-2.5 py-1.5 text-sm border border-slate-300 rounded-md outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 tabular-nums"
      />
    );

    const PersonInfo = ({ info }) => {
      if (!info) return <span className="text-xs text-slate-400">미입력 → 기본공제만</span>;
      return (
        <span className="text-xs text-slate-600 flex items-center gap-1.5 flex-wrap">
          만<span className="font-bold text-slate-800 text-sm">{info.age}세</span>
          <span className="text-slate-400">({info.birthYear}{info.gender ? `·${info.gender}` : ""})</span>
          {info.age >= 70 && (
            <span className="px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-[11px] font-semibold">경로우대 자동</span>
          )}
        </span>
      );
    };

    // ① 종합소득금액 헤더 옆 인라인 박스 — 총수입금액 (placeholder 안내 글자만)
    const InlineRevenueInput = ({ value, onChange, firstFocus }) => {
      const [draft, setDraft] = useState(null);
      const isDraft = draft !== null;
      const display = isDraft ? draft : (value === 0 ? "" : fmt(value));

      const commit = () => {
        if (!isDraft) return;
        const r = evalExpression(draft);
        if (r.valid && r.value !== null) onChange(r.value);
        setDraft(null);
      };

      return (
        <div className="relative">
          <input
            type="text"
            inputMode="text"
            data-nav="primary"
            data-first={firstFocus ? "true" : undefined}
            value={display}
            onChange={(e) => {
              const raw = e.target.value;
              const cleaned = raw.replace(/[,\s]/g, "");
              const hasOp = /[+\-*/]/.test(cleaned.slice(1)) || /^[*/]/.test(cleaned);
              if (hasOp) {
                setDraft(raw);
              } else {
                const numeric = cleaned.replace(/[^\d]/g, "");
                if (numeric === "") { onChange(0); }
                else { const n = parseInt(numeric, 10); if (!isNaN(n)) onChange(n); }
                setDraft(null);
              }
            }}
            onFocus={(e) => e.target.select()}
            onBlur={commit}
            onKeyDown={(e) => { if (e.key === "Enter") commit(); }}
            placeholder="총수입금액 입력"
            style={{ width: "156px" }}
            className={`px-2.5 py-1 ${value > 0 ? "pr-7" : "pr-2.5"} text-right text-xs border rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none tabular-nums ${value > 0 ? "border-blue-400 bg-blue-50 text-blue-900 font-semibold" : "border-slate-300 bg-white"}`}
          />
          {value > 0 && <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none">원</span>}
        </div>
      );
    };

    // ① 종합소득금액 헤더 옆 인라인 박스 — 업종코드 (placeholder 안내 글자만)
    const InlineCodeInput = ({ value, onChange }) => {
      const display = (value || "").replace(/[^\d]/g, "").substring(0, 6);
      const matched = !!BUSINESS_CODES[display];
      const unmatched = display.length === 6 && !matched;
      return (
        <input
          type="text"
          inputMode="numeric"
          data-nav="primary"
          value={display}
          onChange={(e) => onChange(e.target.value.replace(/[^\d]/g, "").substring(0, 6))}
          onFocus={(e) => e.target.select()}
          placeholder="업종코드 입력"
          maxLength={6}
          style={{ width: "110px" }}
          className={`px-2.5 py-1 text-xs text-center border rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none tabular-nums ${matched ? "border-blue-400 bg-blue-50 text-blue-900 font-semibold" : unmatched ? "border-rose-300 bg-rose-50 text-rose-700" : "border-slate-300 bg-white"}`}
        />
      );
    };

    const NumberInput = ({ label, value, onChange, hint, autoFilled, autoFilledMessage, autoFailMessage }) => {
      const [draft, setDraft] = useState(null);
      const isDraft = draft !== null;
      const display = isDraft ? draft : (value === 0 ? "" : fmt(value));

      const preview = useMemo(() => {
        if (!isDraft) return null;
        const r = evalExpression(draft);
        if (!r.hasOperator) return null;
        return r;
      }, [draft, isDraft]);

      const commit = () => {
        if (!isDraft) return;
        const r = evalExpression(draft);
        if (r.valid && r.value !== null) onChange(r.value);
        setDraft(null);
      };

      return (
        <div className="flex flex-col gap-0.5">
          <label className="text-xs font-medium text-slate-700">{label}</label>
          <div className="relative">
            <input
              type="text"
              inputMode="text"
              data-nav="primary"
              value={display}
              onChange={(e) => {
                const raw = e.target.value;
                const cleaned = raw.replace(/[,\s]/g, "");
                const hasOp = /[+\-*/]/.test(cleaned.slice(1)) || /^[*/]/.test(cleaned);
                if (hasOp) {
                  setDraft(raw);
                } else {
                  const numeric = cleaned.replace(/[^\d]/g, "");
                  if (numeric === "") { onChange(0); }
                  else { const n = parseInt(numeric, 10); if (!isNaN(n)) onChange(n); }
                  setDraft(null);
                }
              }}
              onFocus={(e) => e.target.select()}
              onBlur={commit}
              onKeyDown={(e) => { if (e.key === "Enter") commit(); }}
              placeholder="0"
              className={`w-full px-2.5 py-1.5 pr-7 text-right text-sm border rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none tabular-nums ${autoFilled && value > 0 ? "border-blue-300 bg-blue-50/40" : "border-slate-300 bg-white"}`}
            />
            <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">원</span>
          </div>
          {preview && preview.valid && (
            <span className="text-[11px] text-emerald-600 tabular-nums font-semibold">
              = {fmt(preview.value)}원 <span className="text-slate-400 font-normal">(Enter 시 적용)</span>
            </span>
          )}
          {preview && !preview.valid && (
            <span className="text-[11px] text-rose-500 font-medium">식 오류 — 확인 필요</span>
          )}
          {!preview && autoFilled && value > 0 && autoFilledMessage && (
            <span className="text-[11px] text-blue-600 font-semibold">{autoFilledMessage}</span>
          )}
          {!preview && autoFilled && value === 0 && autoFailMessage && (
            <span className="text-[11px] text-rose-500 font-semibold">{autoFailMessage}</span>
          )}
          {!preview && !(autoFilled && (value > 0 ? autoFilledMessage : autoFailMessage)) && hint && (
            <span className="text-[11px] text-slate-400">{hint}</span>
          )}
        </div>
      );
    };

    const Section = ({ title, accent, headerRight, children }) => {
      const colors = {
        blue:    "border-blue-200 bg-blue-50/50",
        emerald: "border-emerald-200 bg-emerald-50/50",
        amber:   "border-amber-200 bg-amber-50/50",
        slate:   "border-slate-200 bg-white",
      };
      return (
        <div className={`print-section rounded-lg border ${colors[accent || "slate"]} p-2.5`}>
          <div className="flex items-center gap-2 mb-1.5">
            <h3 className="text-sm font-bold text-slate-800">{title}</h3>
            {headerRight && <div className="ml-auto flex items-center gap-1.5">{headerRight}</div>}
          </div>
          {children}
        </div>
      );
    };

    const ResultPanel = ({ result, pensionPremium, otherDeduction, taxCredit, prepaid }) => {
      const { isRefund, isZeroPrepaid } = result;
      const finalTaxAbs = Math.abs(result.finalTax);

      // 헤더 분기
      const headerLabel = isRefund ? "환급예정세액 · 실시간" : "총 부담세액 · 실시간";
      const headerBg = isRefund ? "bg-emerald-600" : "bg-blue-600";

      // 상세 내역 라벨/색상 분기
      const incomeTaxLabel = isRefund ? "환급예정세액 (소득세분)" : "차감납부할 세액 (소득세분)";
      const localLabel     = isRefund ? "지방소득세 환급 (×10%)"   : "지방소득세 (×10%)";
      const refundColor    = isRefund ? "text-emerald-600" : "";
      const subTotalBox    = isRefund
        ? "bg-emerald-100 text-emerald-700"
        : "bg-blue-100 text-blue-700";
      const sumLabel       = isRefund ? "총 환급예정세액" : "총 부담세액";

      return (
        <div className="print-result rounded-lg border border-slate-200 bg-white overflow-hidden flex flex-col h-full">
          <div className={`${headerBg} text-white p-3 flex-shrink-0`}>
            <div className="flex items-baseline justify-between">
              <span className="text-xs opacity-90">{headerLabel}</span>
              <span className="text-2xl font-bold tabular-nums leading-tight">
                {fmt(result.totalBurden)}
                <span className="text-sm font-normal opacity-80 ml-1">원</span>
              </span>
            </div>
          </div>

          <div className="flex-1 flex flex-col justify-between p-3 overflow-hidden">
            <div className="text-xs font-bold text-slate-800">상세 계산 내역</div>

            <div className="flex justify-between items-center text-[15px] text-slate-600">
              <span>종합소득금액</span>
              <span className="tabular-nums">{fmt(result.totalIncome)}원</span>
            </div>

            <div>
              <div className="flex justify-between items-center text-[13px] text-slate-700">
                <span>(−) 종합소득공제</span>
                <span className="tabular-nums">{fmt(result.totalDeduction)}원</span>
              </div>
              <div className="pl-3 text-[11px] text-slate-500 mt-0.5 space-y-0">
                <div className="flex justify-between">
                  <span>인적공제 (본인{result.elderlyCount > 0 ? "·경로" : ""}{result.disabledCount > 0 ? "·장애" : ""})</span>
                  <span className="tabular-nums">{fmt(result.personalDeduction)}</span>
                </div>
                {pensionPremium > 0 && (
                  <div className="flex justify-between"><span>국민연금보험료</span><span className="tabular-nums">{fmt(pensionPremium)}</span></div>
                )}
                {otherDeduction > 0 && (
                  <div className="flex justify-between"><span>기타 소득공제</span><span className="tabular-nums">{fmt(otherDeduction)}</span></div>
                )}
              </div>
            </div>

            <div className="flex justify-between items-center text-[16px] bg-slate-100 px-2 -mx-1 rounded font-semibold text-slate-800 py-1">
              <span>= 과세표준</span>
              <span className="tabular-nums">{fmt(result.taxBase)}원</span>
            </div>

            <div className="flex justify-between items-center text-[15px] text-slate-600">
              <span>산출세액</span>
              <span className="tabular-nums">{fmt(result.calculatedTax)}원</span>
            </div>

            <div className="flex justify-between items-center text-[13px] text-slate-700">
              <span>(−) 세액공제</span>
              <span className="tabular-nums">{fmt(taxCredit)}원</span>
            </div>

            <div className="flex justify-between items-center text-[16px] bg-blue-50 px-2 -mx-1 rounded font-semibold text-blue-700 py-1">
              <span>= 결정세액</span>
              <span className="tabular-nums">{fmt(result.decidedTax)}원</span>
            </div>

            {!isZeroPrepaid && (
              <>
                <div className="flex justify-between items-center text-[13px] text-slate-700">
                  <span>(−) 기납부세액</span>
                  <span className="tabular-nums">{fmt(prepaid)}원</span>
                </div>
                <div className={`flex justify-between items-center text-[14px] font-semibold ${isRefund ? "text-emerald-700" : "text-slate-800"}`}>
                  <span>{incomeTaxLabel}</span>
                  <span className={`tabular-nums ${refundColor}`}>{fmt(finalTaxAbs)}원</span>
                </div>
              </>
            )}

            <div className="flex justify-between items-center text-[13px] text-slate-700">
              <span>{localLabel}</span>
              <span className={`tabular-nums ${refundColor}`}>{fmt(result.localTax)}원</span>
            </div>

            <div className={`flex justify-between items-center text-[17px] ${subTotalBox} px-2 -mx-1 rounded font-bold py-1.5`}>
              <span>{sumLabel}</span>
              <span className="tabular-nums">{fmt(result.totalBurden)}원</span>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const containerRef = useRef(null);

      const [businessCode,     setBusinessCode]     = useState("");
      const [revenue,          setRevenue]          = useState(0);
      const [bizAutoDisabled,  setBizAutoDisabled]  = useState(false);

      const [businessIncome,    _setBusinessIncome]    = useState(0);
      const [businessAutoFilled, setBusinessAutoFilled] = useState(false);
      const [laborIncome,       setLaborIncome]        = useState(0);
      const [otherIncome,       setOtherIncome]        = useState(0);
      const [selfRrn,           setSelfRrn]            = useState("");
      const [selfDisabled,      setSelfDisabled]       = useState(false);
      const [pensionPremium,    setPensionPremium]     = useState(0);
      const [otherDeduction,    setOtherDeduction]     = useState(0);
      const [taxCredit,         setTaxCredit]          = useState(70_000);
      const [prepaid,           _setPrepaid]           = useState(0);
      const [lastUpdated,       setLastUpdated]        = useState(null);

      const businessInfo = BUSINESS_CODES[businessCode] || null;
      const bizAutoActive = !!businessInfo && revenue > 0 && !bizAutoDisabled;

      const autoBusinessIncome = bizAutoActive ? calcBusinessIncomeFromRevenue(revenue, businessInfo) : 0;
      const autoPrepaid        = bizAutoActive ? Math.floor(revenue * WITHHOLDING_RATE) : 0;

      const maxBusinessForZeroDecided = useMemo(() => {
        const selfInfo = parseResidentId(selfRrn);
        const elderlyDed = selfInfo?.age >= 70 ? 1_000_000 : 0;
        const disabledDed = selfDisabled ? 2_000_000 : 0;
        const personalDeduction = 1_500_000 + elderlyDed + disabledDed;
        const totalDeduction = personalDeduction + pensionPremium + otherDeduction;
        const maxBase = findMaxBaseZeroTax(taxCredit);
        return Math.max(0, maxBase + totalDeduction - laborIncome - otherIncome);
      }, [selfRrn, selfDisabled, pensionPremium, otherDeduction, taxCredit, laborIncome, otherIncome]);

      const setBusinessCodeAndReset = (v) => {
        setBusinessCode(v);
        setBizAutoDisabled(false);
      };
      const setRevenueAndReset = (v) => {
        setRevenue(v);
        setBizAutoDisabled(false);
      };

      const setBusinessIncome = (v) => {
        _setBusinessIncome(v);
        if (bizAutoActive) setBizAutoDisabled(true);
        setBusinessAutoFilled(false);
      };

      const setPrepaid = (v) => {
        _setPrepaid(v);
        if (bizAutoActive) {
          setBizAutoDisabled(true);
          return;
        }
        if (v > 0 && businessIncome === 0 && !businessAutoFilled) {
          setBusinessAutoFilled(true);
        } else if (v === 0 && businessAutoFilled) {
          setBusinessAutoFilled(false);
          _setBusinessIncome(0);
        }
      };

      useEffect(() => {
        if (bizAutoActive) {
          _setBusinessIncome(autoBusinessIncome);
          _setPrepaid(autoPrepaid);
          setBusinessAutoFilled(false);
        }
      }, [bizAutoActive, autoBusinessIncome, autoPrepaid]);

      useEffect(() => {
        if (!businessInfo && bizAutoDisabled) setBizAutoDisabled(false);
      }, [businessInfo]); // eslint-disable-line

      useEffect(() => {
        if (!bizAutoActive && businessAutoFilled && prepaid > 0) {
          _setBusinessIncome(maxBusinessForZeroDecided);
        }
      }, [maxBusinessForZeroDecided, businessAutoFilled, prepaid, bizAutoActive]);

      const focusFirst = () => {
        setTimeout(() => {
          const first = containerRef.current?.querySelector('input[data-first="true"]');
          if (first) { first.focus(); first.select?.(); return; }
          const fallback = containerRef.current?.querySelector('input[data-nav="primary"]');
          if (fallback) { fallback.focus(); fallback.select?.(); }
        }, 100);
      };

      useEffect(() => { focusFirst(); }, []);

      useEffect(() => {
        const apiUrl = "https://api.github.com/repos/ctasun/income-tax-simulator/commits?path=income-tax-simulator-v2.html&per_page=1";
        fetch(apiUrl)
          .then((r) => (r.ok ? r.json() : Promise.reject()))
          .then((arr) => {
            const iso = arr?.[0]?.commit?.committer?.date;
            if (!iso) { setLastUpdated("확인 불가"); return; }
            const utc = new Date(iso);
            const kst = new Date(utc.getTime() + 9 * 3600 * 1000);
            const pad = (n) => String(n).padStart(2, "0");
            setLastUpdated(
              `${kst.getUTCFullYear()}-${pad(kst.getUTCMonth() + 1)}-${pad(kst.getUTCDate())} ` +
              `${pad(kst.getUTCHours())}:${pad(kst.getUTCMinutes())}`
            );
          })
          .catch(() => setLastUpdated("확인 불가"));
      }, []);

      const handleUpdate = () => {
        const url = new URL(window.location.href);
        url.searchParams.set("_", String(Date.now()));
        window.location.replace(url.toString());
      };

      const handlePrint = () => {
        window.print();
      };

      const handleKeyDown = (e) => {
        if (e.target.tagName !== "INPUT") return;
        if (e.target.type === "checkbox") return;
        if (!["Enter", "ArrowDown", "ArrowUp", "ArrowLeft", "ArrowRight"].includes(e.key)) return;

        const inputs = Array.from(containerRef.current.querySelectorAll('input[data-nav="primary"]'));
        const idx = inputs.indexOf(e.target);
        if (idx === -1) return;

        if (e.key === "ArrowLeft") {
          if (e.target.selectionStart !== 0) return;
          e.preventDefault();
          const prev = idx - 1;
          if (prev >= 0) { inputs[prev].focus(); setTimeout(() => inputs[prev].select?.(), 0); }
          return;
        }
        if (e.key === "ArrowRight") {
          if (e.target.selectionStart !== e.target.value.length) return;
          e.preventDefault();
          const next = idx + 1;
          if (next < inputs.length) { inputs[next].focus(); setTimeout(() => inputs[next].select?.(), 0); }
          return;
        }

        e.preventDefault();
        const delta = e.key === "ArrowUp" ? -1 : 1;
        const next = idx + delta;
        if (next >= 0 && next < inputs.length) {
          inputs[next].focus();
          setTimeout(() => inputs[next].select?.(), 0);
        }
      };

      const result = useMemo(() => {
        const totalIncome = businessIncome + laborIncome + otherIncome;
        const selfInfo = parseResidentId(selfRrn);
        const basicDeduction = 1_500_000;
        const elderlyCount = selfInfo?.age >= 70 ? 1 : 0;
        const elderlyDed = elderlyCount * 1_000_000;
        const disabledCount = selfDisabled ? 1 : 0;
        const disabledDed = disabledCount * 2_000_000;
        const personalDeduction = basicDeduction + elderlyDed + disabledDed;
        const totalDeduction = personalDeduction + pensionPremium + otherDeduction;
        const taxBase = Math.max(0, totalIncome - totalDeduction);
        const { tax: calculatedTax, bracket, marginalRate } = calcTax(taxBase);
        const decidedTax = Math.max(0, calculatedTax - taxCredit);
        const finalTax = decidedTax - prepaid; // 양수: 차감납부, 음수: 환급
        const isZeroPrepaid = prepaid === 0;
        const isRefund = !isZeroPrepaid && finalTax < 0;

        // 헤더 한 줄 요약 기준 금액
        //  - 기납부 0  → 결정세액 × 1.1
        //  - 결정 > 기납부 → (결정 − 기납부) × 1.1
        //  - 결정 < 기납부 → (기납부 − 결정) × 1.1
        const headerBase = isZeroPrepaid ? decidedTax : Math.abs(finalTax);
        const localTax = Math.floor(headerBase * 0.1);
        const totalBurden = headerBase + localTax;

        const avgRate = totalIncome > 0 ? (totalBurden / totalIncome) * 100 : 0;
        return {
          totalIncome, basicDeduction, elderlyCount, elderlyDed,
          disabledCount, disabledDed, personalDeduction, totalDeduction,
          taxBase, calculatedTax, bracket, marginalRate,
          decidedTax, finalTax, localTax, totalBurden, avgRate,
          isZeroPrepaid, isRefund, headerBase,
        };
      }, [businessIncome, laborIncome, otherIncome, selfRrn, selfDisabled, pensionPremium, otherDeduction, taxCredit, prepaid]);

      const reset = () => {
        setBusinessCode(""); setRevenue(0);
        setBizAutoDisabled(false);
        _setBusinessIncome(0); setLaborIncome(0); setOtherIncome(0);
        setSelfRrn(""); setSelfDisabled(false);
        setPensionPremium(0); setOtherDeduction(0);
        setTaxCredit(70_000); _setPrepaid(0);
        setBusinessAutoFilled(false);
        focusFirst();
      };

      const bizIncomeAutoMessage = bizAutoActive
        ? `🔄 ${businessInfo.name} · 단순경비율 자동환산`
        : null;

      const prepaidAutoMessage = bizAutoActive
        ? `🔄 수입금액 × 3% 자동`
        : (businessAutoFilled
            ? "🔄 결정세액 0 임계점 · 100% 환급 한도"
            : null);
      const prepaidAutoFailMsg = (!bizAutoActive && businessAutoFilled)
        ? "⚠️ 100% 환급 불가 (다른 소득으로 결정세액>0)"
        : null;

      // ② 소득공제 헤더 우측 인쇄 버튼
      const printButton = (
        <button
          onClick={handlePrint}
          title="현재 화면을 A4 1페이지 세로로 인쇄"
          className="no-print flex items-center gap-1 px-2 py-1 text-[11px] font-semibold text-slate-700 bg-white border border-slate-300 rounded hover:bg-slate-50"
          tabIndex={-1}
        >
          <PrinterIcon className="w-3 h-3" /> 인쇄
        </button>
      );

      return (
        <div ref={containerRef} onKeyDown={handleKeyDown} className="h-screen bg-slate-100 overflow-hidden flex flex-col">
          <div className="max-w-7xl w-full mx-auto px-3 py-2 flex flex-col flex-1 overflow-hidden">

            <div className="flex items-center justify-between mb-2 bg-white rounded-lg border border-slate-200 px-3 py-1.5 flex-shrink-0">
              <div className="flex items-center gap-2 flex-wrap">
                <CalculatorIcon className="w-4 h-4 text-blue-600" />
                <h1 className="text-sm font-bold text-slate-800">종합소득세 시뮬레이터 v2</h1>
                <span className="text-[11px] text-slate-400 hidden sm:inline">
                  {TAX_YEAR} 귀속 · 내부 검토용 · 만나이 {TAX_YEAR}.12.31 기준
                </span>
                <span className="text-[11px] px-1.5 py-0.5 bg-emerald-50 text-emerald-700 rounded font-semibold hidden md:inline">
                  + − × ÷ 식 입력 가능
                </span>
                <span className="text-[11px] px-1.5 py-0.5 bg-blue-50 text-blue-700 rounded font-semibold hidden md:inline">
                  인적용역 940xxx 자동환산
                </span>
              </div>
              <div className="no-print flex items-center gap-2 text-[11px] text-slate-500">
                <span className="hidden sm:inline-flex items-center gap-1 px-1.5 py-0.5 bg-slate-50 rounded">
                  <ClockIcon className="w-3 h-3 text-slate-400" />
                  최종 업데이트
                  <span className="tabular-nums text-slate-800 font-medium ml-0.5">{lastUpdated || "..."}</span>
                </span>
                <button
                  onClick={handleUpdate}
                  title="캐시 무시 강제 새로고침"
                  className="flex items-center gap-1 text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-2 py-1 rounded"
                  tabIndex={-1}
                >
                  <RefreshIcon className="w-3 h-3" /> 업데이트
                </button>
                <span className="hidden md:inline">
                  <kbd className="px-1 bg-slate-100 rounded text-[10px]">Enter</kbd>·
                  <kbd className="px-1 bg-slate-100 rounded text-[10px]">↑↓←→</kbd> 이동
                </span>
                <button onClick={reset} className="flex items-center gap-1 text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-2 py-1 rounded" tabIndex={-1}>
                  <ResetIcon className="w-3 h-3" /> 초기화
                </button>
              </div>
            </div>

            <div className="print-main-grid grid grid-cols-1 md:grid-cols-5 gap-x-2 gap-y-0 md:gap-y-2 items-stretch">

              <div className="md:col-span-3 flex flex-col gap-2">

                <Section
                  title="① 종합소득금액"
                  accent="blue"
                  headerRight={
                    <>
                      <InlineRevenueInput value={revenue} onChange={setRevenueAndReset} firstFocus />
                      <InlineCodeInput value={businessCode} onChange={setBusinessCodeAndReset} />
                    </>
                  }
                >
                  <div className="gap-2" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr" }}>
                    <NumberInput
                      label="사업소득금액"
                      value={businessIncome}
                      onChange={setBusinessIncome}
                      hint="총수입 − 필요경비 (예: 15000000+10000000)"
                      autoFilled={bizAutoActive || businessAutoFilled}
                      autoFilledMessage={bizIncomeAutoMessage || (businessAutoFilled ? "🔄 결정세액 0 임계점 · 100% 환급 한도" : null)}
                      autoFailMessage={(!bizAutoActive && businessAutoFilled) ? "⚠️ 100% 환급 불가 (다른 소득으로 결정세액>0)" : null}
                    />
                    <NumberInput label="근로소득금액"      value={laborIncome} onChange={setLaborIncome} hint="총급여 − 근로소득공제" />
                    <NumberInput label="기타 종합소득금액" value={otherIncome} onChange={setOtherIncome} hint="이자·배당·연금·기타" />
                  </div>
                </Section>

                <Section title="② 소득공제" accent="emerald" headerRight={printButton}>
                  <div className="space-y-2">
                    <div>
                      <p className="text-[11px] text-slate-500 mb-1">
                        본인 주민번호 앞 7자리 입력 시 만 70세 이상 경로우대 자동 적용
                      </p>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-xs font-semibold text-slate-700 w-10">본인</span>
                        <RrnInput value={selfRrn} onChange={setSelfRrn} />
                        <label className="flex items-center gap-1 text-xs text-slate-600">
                          <input type="checkbox" checked={selfDisabled} onChange={(e) => setSelfDisabled(e.target.checked)} tabIndex={-1} className="rounded" />
                          장애인
                        </label>
                        <PersonInfo info={parseResidentId(selfRrn)} />
                      </div>
                    </div>
                    <div className="grid gap-2 pt-1 border-t border-emerald-200/60" style={{ gridTemplateColumns: "2fr 3fr" }}>
                      <NumberInput label="국민연금보험료" value={pensionPremium} onChange={setPensionPremium} />
                      <NumberInput label={<>기타 소득공제<span style={{ fontSize: "90%" }}>(신용카드·주택자금 등)</span></>} value={otherDeduction} onChange={setOtherDeduction} />
                    </div>
                  </div>
                </Section>

                <div className="grid gap-2" style={{ gridTemplateColumns: "2fr 3fr" }}>
                  <Section title="③ 세액공제" accent="amber">
                    <NumberInput label="세액공제 (기본: 표준세액공제)" value={taxCredit} onChange={setTaxCredit} />
                  </Section>
                  <Section title="④ 기납부세액" accent="slate">
                    <NumberInput
                      label={<>원천징수·중간예납<span style={{ fontSize: "90%" }}> (결정세액에서 차감)</span></>}
                      value={prepaid}
                      onChange={setPrepaid}
                      autoFilled={bizAutoActive || businessAutoFilled}
                      autoFilledMessage={prepaidAutoMessage}
                      autoFailMessage={prepaidAutoFailMsg}
                    />
                  </Section>
                </div>
              </div>

              <div className="md:col-span-2 flex flex-col">
                <ResultPanel
                  result={result}
                  pensionPremium={pensionPremium}
                  otherDeduction={otherDeduction}
                  taxCredit={taxCredit}
                  prepaid={prepaid}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
