<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종합소득세 시뮬레이터 v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    kbd { font-family: "Noto Sans KR", monospace; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect, useRef } = React;

    const TAX_YEAR = 2025;

    const BRACKETS = [
      { limit: 14_000_000,    rate: 0.06, deduction: 0,          label: "1,400만원 이하" },
      { limit: 50_000_000,    rate: 0.15, deduction: 1_260_000,  label: "1,400만~5,000만원" },
      { limit: 88_000_000,    rate: 0.24, deduction: 5_760_000,  label: "5,000만~8,800만원" },
      { limit: 150_000_000,   rate: 0.35, deduction: 15_440_000, label: "8,800만~1.5억원" },
      { limit: 300_000_000,   rate: 0.38, deduction: 19_940_000, label: "1.5억~3억원" },
      { limit: 500_000_000,   rate: 0.40, deduction: 25_940_000, label: "3억~5억원" },
      { limit: 1_000_000_000, rate: 0.42, deduction: 35_940_000, label: "5억~10억원" },
      { limit: Infinity,      rate: 0.45, deduction: 65_940_000, label: "10억원 초과" },
    ];

    const calcTax = (taxBase) => {
      if (taxBase <= 0) return { tax: 0, bracket: null, marginalRate: 0 };
      for (const b of BRACKETS) {
        if (taxBase <= b.limit) {
          return { tax: Math.floor(taxBase * b.rate - b.deduction), bracket: b, marginalRate: b.rate };
        }
      }
      return { tax: 0, bracket: null, marginalRate: 0 };
    };

    const fmt = (n) => {
      if (!n || isNaN(n)) return "0";
      return Math.floor(Math.abs(n)).toLocaleString("ko-KR");
    };

    const evalExpression = (raw) => {
      if (raw == null) return { valid: false, value: null, hasOperator: false };
      const cleaned = String(raw).replace(/[,\s]/g, "");
      if (cleaned === "") return { valid: true, value: 0, hasOperator: false };
      const hasOperator = /[+\-*/]/.test(cleaned.slice(1)) || /^[*/]/.test(cleaned);
      if (!/^[\d+\-*/.()]+$/.test(cleaned)) return { valid: false, value: null, hasOperator };
      try {
        const result = new Function('"use strict"; return (' + cleaned + ');')();
        if (typeof result !== "number" || !isFinite(result) || isNaN(result)) return { valid: false, value: null, hasOperator };
        return { valid: true, value: Math.floor(result), hasOperator };
      } catch {
        return { valid: false, value: null, hasOperator };
      }
    };

    const parseResidentId = (rrn) => {
      const cleaned = (rrn || "").replace(/[^\d]/g, "");
      if (cleaned.length < 6) return null;
      const yy = parseInt(cleaned.substring(0, 2), 10);
      const mm = parseInt(cleaned.substring(2, 4), 10);
      const dd = parseInt(cleaned.substring(4, 6), 10);
      if (isNaN(yy) || isNaN(mm) || isNaN(dd)) return null;
      if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
      let century, gender = null;
      if (cleaned.length >= 7) {
        const s = parseInt(cleaned.charAt(6), 10);
        if (s === 9 || s === 0) century = 1800;
        else if (s === 1 || s === 2) century = 1900;
        else if (s === 3 || s === 4) century = 2000;
        else if (s === 5 || s === 6) century = 1900;
        else if (s === 7 || s === 8) century = 2000;
        else century = 1900;
        gender = s % 2 === 1 ? "남" : "여";
      } else {
        const currentYY = new Date().getFullYear() % 100;
        century = yy <= currentYY + 5 ? 2000 : 1900;
      }
      const birthYear = century + yy;
      const age = TAX_YEAR - birthYear;
      return { age, birthYear, gender };
    };

    const formatRrnDisplay = (rrn) => {
      const c = (rrn || "").replace(/[^\d]/g, "").substring(0, 7);
      if (c.length <= 6) return c;
      return `${c.substring(0, 6)}-${c.substring(6, 7)}`;
    };

    const CalculatorIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="16" height="20" x="4" y="2" rx="2"/>
        <line x1="8" x2="16" y1="6" y2="6"/>
        <line x1="16" x2="16" y1="14" y2="18"/>
        <path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/>
        <path d="M12 14h.01"/><path d="M8 14h.01"/>
        <path d="M12 18h.01"/><path d="M8 18h.01"/>
      </svg>
    );

    const ResetIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    );

    const RrnInput = ({ value, onChange }) => (
      <input
        type="text"
        inputMode="numeric"
        data-nav="primary"
        value={formatRrnDisplay(value)}
        onChange={(e) => {
          const raw = e.target.value.replace(/[^\d]/g, "").substring(0, 7);
          onChange(raw);
        }}
        onFocus={(e) => e.target.select()}
        placeholder="YYMMDD-S"
        maxLength={8}
        className="w-32 px-2.5 py-1.5 text-sm border border-slate-300 rounded-md outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 tabular-nums"
      />
    );

    const PersonInfo = ({ info }) => {
      if (!info) return <span className="text-xs text-slate-400">미입력 → 기본공제만</span>;
      return (
        <span className="text-xs text-slate-600 flex items-center gap-1.5 flex-wrap">
          만<span className="font-bold text-slate-800 text-sm">{info.age}세</span>
          <span className="text-slate-400">({info.birthYear}{info.gender ? `·${info.gender}` : ""})</span>
          {info.age >= 70 && (
            <span className="px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded text-[11px] font-semibold">경로우대 자동</span>
          )}
        </span>
      );
    };

    const NumberInput = ({ label, value, onChange, hint }) => {
      const [draft, setDraft] = useState(null);
      const isDraft = draft !== null;
      const display = isDraft ? draft : (value === 0 ? "" : fmt(value));

      const preview = useMemo(() => {
        if (!isDraft) return null;
        const r = evalExpression(draft);
        if (!r.hasOperator) return null;
        return r;
      }, [draft, isDraft]);

      const commit = () => {
        if (!isDraft) return;
        const r = evalExpression(draft);
        if (r.valid && r.value !== null) onChange(r.value);
        setDraft(null);
      };

      return (
        <div className="flex flex-col gap-0.5">
          <label className="text-xs font-medium text-slate-700">{label}</label>
          <div className="relative">
            <input
              type="text"
              inputMode="text"
              data-nav="primary"
              value={display}
              onChange={(e) => {
                const raw = e.target.value;
                const cleaned = raw.replace(/[,\s]/g, "");
                const hasOp = /[+\-*/]/.test(cleaned.slice(1)) || /^[*/]/.test(cleaned);
                if (hasOp) {
                  setDraft(raw);
                } else {
                  const numeric = cleaned.replace(/[^\d]/g, "");
                  if (numeric === "") { onChange(0); }
                  else { const n = parseInt(numeric, 10); if (!isNaN(n)) onChange(n); }
                  setDraft(null);
                }
              }}
              onFocus={(e) => e.target.select()}
              onBlur={commit}
              onKeyDown={(e) => { if (e.key === "Enter") commit(); }}
              placeholder="0"
              className="w-full px-2.5 py-1.5 pr-7 text-right text-sm border border-slate-300 rounded-md focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none bg-white tabular-nums"
            />
            <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none">원</span>
          </div>
          {preview && preview.valid && (
            <span className="text-[11px] text-emerald-600 tabular-nums font-semibold">
              = {fmt(preview.value)}원 <span className="text-slate-400 font-normal">(Enter 시 적용)</span>
            </span>
          )}
          {preview && !preview.valid && (
            <span className="text-[11px] text-rose-500 font-medium">식 오류 — 확인 필요</span>
          )}
          {!preview && hint && <span className="text-[11px] text-slate-400">{hint}</span>}
        </div>
      );
    };

    const Section = ({ title, accent, children }) => {
      const colors = {
        blue:    "border-blue-200 bg-blue-50/50",
        emerald: "border-emerald-200 bg-emerald-50/50",
        amber:   "border-amber-200 bg-amber-50/50",
        slate:   "border-slate-200 bg-white",
      };
      return (
        <div className={`rounded-lg border ${colors[accent || "slate"]} p-2.5`}>
          <h3 className="text-sm font-bold text-slate-800 mb-1.5">{title}</h3>
          {children}
        </div>
      );
    };

    const ResultPanel = ({ result, pensionPremium, otherDeduction, taxCredit, prepaid }) => (
      <div className="rounded-lg border border-slate-200 bg-white overflow-hidden flex flex-col h-full">
        {/* 파란 헤더 */}
        <div className="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-3 flex-shrink-0">
          <div className="flex items-baseline justify-between">
            <span className="text-xs opacity-90">총 부담세액 · 실시간</span>
            <span className="text-2xl font-bold tabular-nums leading-tight">
              {fmt(result.totalBurden)}
              <span className="text-sm font-normal opacity-80 ml-1">원</span>
            </span>
          </div>
          <div className="grid grid-cols-4 gap-1 mt-2 pt-2 border-t border-white/20 text-[11px]">
            <div><div className="opacity-70">결정세액</div><div className="font-semibold tabular-nums text-[13px]">{fmt(result.decidedTax)}</div></div>
            <div><div className="opacity-70">지방소득세</div><div className="font-semibold tabular-nums text-[13px]">{fmt(result.localTax)}</div></div>
            <div><div className="opacity-70">한계세율</div><div className="font-semibold text-[13px]">{(result.marginalRate * 100).toFixed(0)}%</div></div>
            <div><div className="opacity-70">평균세율</div><div className="font-semibold text-[13px]">{result.avgRate.toFixed(2)}%</div></div>
          </div>
          {prepaid > 0 && (
            <div className="mt-2 pt-2 border-t border-white/20 flex justify-between text-xs">
              <span className="opacity-80">{result.finalTax >= 0 ? "차감납부할 세액" : "환급예정세액"}</span>
              <span className="font-bold tabular-nums">{fmt(result.finalTax)}원</span>
            </div>
          )}
        </div>

        {/* 상세 내역: flex-1 + justify-between으로 결과창 높이를 꽉 채움 */}
        <div className="flex-1 flex flex-col justify-between p-3 overflow-hidden">
          <div className="text-xs font-bold text-slate-800">상세 계산 내역</div>

          <div className="flex justify-between items-center text-[15px] text-slate-600">
            <span>종합소득금액</span>
            <span className="tabular-nums">{fmt(result.totalIncome)}원</span>
          </div>

          {/* 90% 크기 · 검은색 */}
          <div>
            <div className="flex justify-between items-center text-[13px] text-slate-700">
              <span>(−) 종합소득공제</span>
              <span className="tabular-nums">{fmt(result.totalDeduction)}원</span>
            </div>
            <div className="pl-3 text-[11px] text-slate-500 mt-0.5 space-y-0">
              <div className="flex justify-between">
                <span>인적공제 (본인{result.elderlyCount > 0 ? "·경로" : ""}{result.disabledCount > 0 ? "·장애" : ""})</span>
                <span className="tabular-nums">{fmt(result.personalDeduction)}</span>
              </div>
              {pensionPremium > 0 && (
                <div className="flex justify-between"><span>국민연금보험료</span><span className="tabular-nums">{fmt(pensionPremium)}</span></div>
              )}
              {otherDeduction > 0 && (
                <div className="flex justify-between"><span>기타 소득공제</span><span className="tabular-nums">{fmt(otherDeduction)}</span></div>
              )}
            </div>
          </div>

          <div className="flex justify-between items-center text-[16px] bg-slate-100 px-2 -mx-1 rounded font-semibold text-slate-800 py-1">
            <span>= 과세표준</span>
            <span className="tabular-nums">{fmt(result.taxBase)}원</span>
          </div>

          <div className="flex justify-between items-center text-[15px] text-slate-600">
            <span>산출세액</span>
            <span className="tabular-nums">{fmt(result.calculatedTax)}원</span>
          </div>

          {/* 90% 크기 · 검은색 */}
          <div className="flex justify-between items-center text-[13px] text-slate-700">
            <span>(−) 세액공제</span>
            <span className="tabular-nums">{fmt(taxCredit)}원</span>
          </div>

          <div className="flex justify-between items-center text-[16px] bg-blue-50 px-2 -mx-1 rounded font-semibold text-blue-700 py-1">
            <span>= 결정세액</span>
            <span className="tabular-nums">{fmt(result.decidedTax)}원</span>
          </div>

          {prepaid > 0 && (
            <>
              <div className="flex justify-between items-center text-[13px] text-slate-700">
                <span>(−) 기납부세액</span>
                <span className="tabular-nums">{fmt(prepaid)}원</span>
              </div>
              <div className="flex justify-between items-center text-[15px] font-semibold text-slate-800">
                <span>{result.finalTax >= 0 ? "차감납부할 세액" : "환급예정세액"}</span>
                <span className={`tabular-nums ${result.finalTax < 0 ? "text-emerald-600" : ""}`}>
                  {fmt(result.finalTax)}원
                </span>
              </div>
            </>
          )}

          {/* 90% 크기 · 검은색 */}
          <div className="flex justify-between items-center text-[13px] text-slate-700">
            <span>지방소득세 (×10%)</span>
            <span className="tabular-nums">{fmt(result.localTax)}원</span>
          </div>

          <div className="flex justify-between items-center text-[17px] bg-blue-100 px-2 -mx-1 rounded font-bold text-blue-700 py-1.5">
            <span>총 부담세액</span>
            <span className="tabular-nums">{fmt(result.totalBurden)}원</span>
          </div>
        </div>
      </div>
    );

    function App() {
      const containerRef = useRef(null);
      const [businessIncome, setBusinessIncome] = useState(0);
      const [laborIncome,    setLaborIncome]    = useState(0);
      const [otherIncome,    setOtherIncome]    = useState(0);
      const [selfRrn,        setSelfRrn]        = useState("");
      const [selfDisabled,   setSelfDisabled]   = useState(false);
      const [pensionPremium, setPensionPremium] = useState(0);
      const [otherDeduction, setOtherDeduction] = useState(0);
      const [taxCredit,      setTaxCredit]      = useState(70_000);
      const [prepaid,        setPrepaid]        = useState(0);

      const focusFirst = () => {
        setTimeout(() => {
          const first = containerRef.current?.querySelector('input[data-nav="primary"]');
          if (first) { first.focus(); first.select?.(); }
        }, 100);
      };

      useEffect(() => { focusFirst(); }, []);

      const handleKeyDown = (e) => {
        if (e.target.tagName !== "INPUT") return;
        if (e.target.type === "checkbox") return;
        if (!["Enter", "ArrowDown", "ArrowUp", "ArrowLeft", "ArrowRight"].includes(e.key)) return;

        const inputs = Array.from(containerRef.current.querySelectorAll('input[data-nav="primary"]'));
        const idx = inputs.indexOf(e.target);
        if (idx === -1) return;

        // ← : 커서가 맨 앞일 때만 이전 필드로
        if (e.key === "ArrowLeft") {
          if (e.target.selectionStart !== 0) return;
          e.preventDefault();
          const prev = idx - 1;
          if (prev >= 0) { inputs[prev].focus(); setTimeout(() => inputs[prev].select?.(), 0); }
          return;
        }
        // → : 커서가 맨 끝일 때만 다음 필드로
        if (e.key === "ArrowRight") {
          if (e.target.selectionStart !== e.target.value.length) return;
          e.preventDefault();
          const next = idx + 1;
          if (next < inputs.length) { inputs[next].focus(); setTimeout(() => inputs[next].select?.(), 0); }
          return;
        }

        // Enter / ↑ / ↓
        e.preventDefault();
        const delta = e.key === "ArrowUp" ? -1 : 1;
        const next = idx + delta;
        if (next >= 0 && next < inputs.length) {
          inputs[next].focus();
          setTimeout(() => inputs[next].select?.(), 0);
        }
      };

      const result = useMemo(() => {
        const totalIncome = businessIncome + laborIncome + otherIncome;
        const selfInfo = parseResidentId(selfRrn);
        const basicDeduction = 1_500_000;
        const elderlyCount = selfInfo?.age >= 70 ? 1 : 0;
        const elderlyDed = elderlyCount * 1_000_000;
        const disabledCount = selfDisabled ? 1 : 0;
        const disabledDed = disabledCount * 2_000_000;
        const personalDeduction = basicDeduction + elderlyDed + disabledDed;
        const totalDeduction = personalDeduction + pensionPremium + otherDeduction;
        const taxBase = Math.max(0, totalIncome - totalDeduction);
        const { tax: calculatedTax, bracket, marginalRate } = calcTax(taxBase);
        const decidedTax = Math.max(0, calculatedTax - taxCredit);
        const finalTax = decidedTax - prepaid;
        const localTax = Math.floor(decidedTax * 0.1);
        const totalBurden = decidedTax + localTax;
        const avgRate = totalIncome > 0 ? (totalBurden / totalIncome) * 100 : 0;
        return {
          totalIncome, basicDeduction, elderlyCount, elderlyDed,
          disabledCount, disabledDed, personalDeduction, totalDeduction,
          taxBase, calculatedTax, bracket, marginalRate,
          decidedTax, finalTax, localTax, totalBurden, avgRate,
        };
      }, [businessIncome, laborIncome, otherIncome, selfRrn, selfDisabled, pensionPremium, otherDeduction, taxCredit, prepaid]);

      const reset = () => {
        setBusinessIncome(0); setLaborIncome(0); setOtherIncome(0);
        setSelfRrn(""); setSelfDisabled(false);
        setPensionPremium(0); setOtherDeduction(0);
        setTaxCredit(70_000); setPrepaid(0);
        focusFirst();
      };

      return (
        <div ref={containerRef} onKeyDown={handleKeyDown} className="h-screen bg-slate-100 overflow-hidden flex flex-col">
          <div className="max-w-7xl w-full mx-auto px-3 py-2 flex flex-col flex-1 overflow-hidden">

            {/* 헤더 바 */}
            <div className="flex items-center justify-between mb-2 bg-white rounded-lg border border-slate-200 px-3 py-1.5 flex-shrink-0">
              <div className="flex items-center gap-2 flex-wrap">
                <CalculatorIcon className="w-4 h-4 text-blue-600" />
                <h1 className="text-sm font-bold text-slate-800">종합소득세 시뮬레이터 v2</h1>
                <span className="text-[11px] text-slate-400 hidden sm:inline">
                  {TAX_YEAR} 귀속 · 내부 검토용 · 만나이 {TAX_YEAR}.12.31 기준
                </span>
                <span className="text-[11px] px-1.5 py-0.5 bg-emerald-50 text-emerald-700 rounded font-semibold hidden md:inline">
                  + − × ÷ 식 입력 가능
                </span>
              </div>
              <div className="flex items-center gap-2 text-[11px] text-slate-500">
                <span className="hidden md:inline">
                  <kbd className="px-1 bg-slate-100 rounded text-[10px]">Enter</kbd>·
                  <kbd className="px-1 bg-slate-100 rounded text-[10px]">↑↓←→</kbd> 이동
                </span>
                <button onClick={reset} className="flex items-center gap-1 text-slate-600 hover:text-slate-900 hover:bg-slate-100 px-2 py-1 rounded" tabIndex={-1}>
                  <ResetIcon className="w-3 h-3" /> 초기화
                </button>
              </div>
            </div>

            {/* 본문 */}
            <div className="grid grid-cols-1 md:grid-cols-5 gap-x-2 gap-y-0 md:gap-y-2 items-stretch">

              {/* 왼쪽 입력 */}
              <div className="md:col-span-3 flex flex-col gap-2">

                {/* ① 사업 2fr / 근로 1fr / 기타 1fr */}
                <Section title="① 종합소득금액" accent="blue">
                  <div className="gap-2" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr" }}>
                    <NumberInput label="사업소득금액"      value={businessIncome} onChange={setBusinessIncome} hint="총수입 − 필요경비 (예: 15000000+10000000)" />
                    <NumberInput label="근로소득금액"      value={laborIncome}    onChange={setLaborIncome}    hint="총급여 − 근로소득공제" />
                    <NumberInput label="기타 종합소득금액" value={otherIncome}    onChange={setOtherIncome}    hint="이자·배당·연금·기타" />
                  </div>
                </Section>

                {/* ② 콘텐츠 높이만 */}
                <Section title="② 소득공제" accent="emerald">
                  <div className="space-y-2">
                    <div>
                      <p className="text-[11px] text-slate-500 mb-1">
                        본인 주민번호 앞 7자리 입력 시 만 70세 이상 경로우대 자동 적용
                      </p>
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-xs font-semibold text-slate-700 w-10">본인</span>
                        <RrnInput value={selfRrn} onChange={setSelfRrn} />
                        <label className="flex items-center gap-1 text-xs text-slate-600">
                          <input type="checkbox" checked={selfDisabled} onChange={(e) => setSelfDisabled(e.target.checked)} tabIndex={-1} className="rounded" />
                          장애인
                        </label>
                        <PersonInfo info={parseResidentId(selfRrn)} />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2 pt-1 border-t border-emerald-200/60">
                      <NumberInput label="국민연금보험료" value={pensionPremium} onChange={setPensionPremium} />
                      <NumberInput label="기타 소득공제"  value={otherDeduction} onChange={setOtherDeduction} hint="신용카드·주택자금 등" />
                    </div>
                  </div>
                </Section>

                {/* ③④ */}
                <div className="grid grid-cols-2 gap-2">
                  <Section title="③ 세액공제" accent="amber">
                    <NumberInput label="세액공제 (기본: 표준세액공제)" value={taxCredit} onChange={setTaxCredit} hint="자녀·특별세액공제 합산 등 필요시 입력" />
                  </Section>
                  <Section title="④ 기납부세액" accent="slate">
                    <NumberInput label="원천징수·중간예납 (결정세액에서 차감)" value={prepaid} onChange={setPrepaid} />
                  </Section>
                </div>
              </div>

              {/* 오른쪽 결과창: 왼쪽과 동일 높이로 stretch */}
              <div className="md:col-span-2 flex flex-col">
                <ResultPanel
                  result={result}
                  pensionPremium={pensionPremium}
                  otherDeduction={otherDeduction}
                  taxCredit={taxCredit}
                  prepaid={prepaid}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
